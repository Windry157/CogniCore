name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: 'cognicore/requirements.txt'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r cognicore/requirements.txt
        pip install pytest pytest-asyncio
    
    - name: Run tests
      run: |
        echo "=== Running core tests ==="
        cd cognicore
        python -m pytest tests/ -v --tb=short
        
        echo "=== Running root tests ==="
        cd ..
        python -m pytest tests/ -v --tb=short
  
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: Install linters
      run: |
        pip install flake8
    
    - name: Check formatting
      run: |
        echo "=== Checking code style with flake8 ==="
        flake8 cognicore/src/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
        flake8 cognicore/src/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics || true
