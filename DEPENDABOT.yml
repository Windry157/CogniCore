version: 2
updates:
  # GitHub Actions 自动更新
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "Windry157"
    assignees:
      - "Windry157"
    labels:
      - "dependencies"
      - "github-actions"

  # Python 依赖自动更新
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "Windry157"
    labels:
      - "dependencies"
      - "python"
